<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinematic Earth</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="label" class="floating-label" hidden></div>

    <nav class="bottom-nav" aria-label="Earth interactions">
      <button type="button" class="nav-btn" data-action="auto">自动模式</button>
      <button type="button" class="nav-btn" data-action="pulse">脉冲</button>
      <button type="button" class="nav-btn" data-action="belt">银河环带</button>
      <button type="button" class="nav-btn" data-action="meteor">流星雨</button>
      <button type="button" class="nav-btn" data-action="reset">重置视角</button>
    </nav>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
